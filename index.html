<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calibro35 — Strategic Creative Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>/* ── HERO ── */
/* ── HERO ── */
.hero {
  position: relative; min-height: 100vh;
  display: flex; align-items: center; overflow: hidden;
  background: #0e0d09;
}
/* Video layer — full bleed, desktop only */
.hero-video {
  position: absolute; inset: 0; z-index: 1;
  overflow: hidden;
}
.hero-video video {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  display: block;
}
/* Static fallback — mobile only, hidden on desktop */
.hero-static {
  position: absolute; inset: 0; z-index: 1;
  background-size: cover; background-position: center;
  display: none;
}
/* Overlay */
.hero-overlay {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(
    to right,
    rgba(10,9,6,0.72) 0%,
    rgba(10,9,6,0.50) 50%,
    rgba(10,9,6,0.28) 100%
  );
}
/* Content */
.hero-inner {
  position: relative; z-index: 3;
  width: 100%; max-width: 1140px;
  margin: 0 auto; padding: 120px 32px 80px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 48px; align-items: center;
}
.hero-copy { display: flex; flex-direction: column; align-items: flex-start; }
.hero h1 {
  font-size: clamp(38px,4.8vw,64px); font-weight: 900;
  letter-spacing: -0.035em; line-height: 1.04; margin-bottom: 28px;
  color: #fff;
}
.hero h1 .line1 { display: block; }
.hero h1 .line2 { display: block; font-style: italic; }
.hero-trust {
  display: flex; align-items: center; gap: 10px; margin-bottom: 36px;
}
.hero-trust-line {
  width: 24px; height: 2px; background: #f1740c; border-radius: 2px; flex-shrink: 0;
}
.hero-trust span { font-size: 13px; color: rgba(255,255,255,0.65); font-weight: 500; }
.hero-trust strong { color: #fff; font-weight: 700; }
.hero-cta {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.hero-cta .btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; border-radius: 999px;
  background: #f1740c; color: #fff;
  font-family: var(--font); font-weight: 700; font-size: 15px;
  text-decoration: none; transition: all 0.2s;
  animation: hero-pulse 2.5s ease-in-out infinite;
}
.hero-cta .btn-primary:hover {
  background: #d4620a; transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(241,116,12,0.45); animation: none;
}
.hero-cta .btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 26px; border-radius: 999px;
  background: rgba(255,255,255,0.12);
  border: 1.5px solid rgba(255,255,255,0.40);
  color: #fff; font-family: var(--font); font-weight: 600; font-size: 15px;
  text-decoration: none; transition: all 0.2s;
}
.hero-cta .btn-secondary:hover {
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.7);
}
@keyframes hero-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(241,116,12,0.5); }
  50%      { box-shadow: 0 0 0 12px rgba(241,116,12,0); }
}
.hero-stats {
  display: flex; flex-direction: column; gap: 16px;
  padding-left: 24px; border-left: 1px solid rgba(255,255,255,0.15);
}
.hero-stat-pill {
  display: flex; align-items: flex-start; gap: 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 16px; padding: 20px 22px;
  backdrop-filter: blur(12px);
  transition: background 0.2s, border-color 0.2s;
}
.hero-stat-pill:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(241,116,12,0.4);
}
.hero-stat-body { display: flex; flex-direction: column; gap: 3px; }
.hero-stat-value {
  font-size: 28px; font-weight: 900; color: #fff;
  letter-spacing: -0.03em; line-height: 1.05;
}
.hero-stat-label {
  font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; line-height: 1.4;
}
.hero-scroll {
  position: absolute; bottom: 32px; left: 50%;
  transform: translateX(-50%); z-index: 3;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  opacity: 0.5; animation: hero-bounce 2s ease-in-out infinite;
}
.hero-scroll span {
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: #fff; font-weight: 600;
}
.hero-scroll svg { width: 18px; height: 18px; fill: #fff; }
@keyframes hero-bounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(6px); }
}
@media (min-width: 769px) {
  .hero-video  { display: block; }
  .hero-static { display: none; }
}
@media (max-width: 768px) {
  .hero { min-height: 100svh; }
  .hero-video  { display: none; }
  .hero-static { display: block; }
  .hero-inner  { grid-template-columns: 1fr; padding: 100px 24px 80px; gap: 32px; }
  .hero h1     { font-size: 36px; }
  .hero-stats  {
    flex-direction: row; flex-wrap: wrap;
    border-left: none; padding-left: 0;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 20px; gap: 12px;
  }
  .hero-stat-pill { flex: 1 1 calc(50% - 6px); min-width: 140px; }
  .hero-cta .btn-primary,
  .hero-cta .btn-secondary { width: 100%; justify-content: center; }
}



*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white: #ffffff;
  --bg: #f5f4f0;
  --bg2: #eeede8;
  --surface: #ffffff;
  --border: #e2e0d8;
  --border2: #ccc9bc;
  --text: #0e0d09;
  --text2: #3a3830;
  --muted: #7a7768;
  --accent: #f1740c;       /* gold */
  --accent-h: #d4610a;
  --accent-light: #fff3eb;
  --accent2: #1a1916;      /* near-black second accent */
  --green: #4a7c59;
  --font: 'Outfit', sans-serif;
  --r: 14px;
  --r-sm: 9px;
  --sh: 0 1px 12px rgba(0,0,0,0.07), 0 4px 24px rgba(0,0,0,0.05);
  --sh-lg: 0 8px 40px rgba(0,0,0,0.11);
}
html { scroll-behavior: smooth; }
body { background: var(--white); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; font: inherit; }
.container { max-width: 1140px; margin: 0 auto; padding: 0 28px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 22px; border-radius: 999px; font-weight: 700; font-size: 13.5px; transition: all 0.2s; white-space: nowrap; cursor: pointer; font-family: var(--font); letter-spacing: 0.01em; }
.btn-dark { background: var(--text); color: #fff; }
.btn-dark:hover { background: #2a2920; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,13,9,0.28); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,168,75,0.4); }
.btn-outline { background: transparent; color: var(--text2); border: 1.5px solid var(--border2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: rgba(255,255,255,0.94); backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}
.nav-wrap { display: flex; align-items: center; height: 60px; gap: 20px; }
.logo { display: flex; align-items: center; gap: 9px; font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
.logo-box {
  width: 30px; height: 30px; background: var(--text); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: var(--accent); letter-spacing: -0.04em; line-height: 1;
}
.nav-links { display: flex; align-items: center; gap: 1px; margin-left: 16px; }
.nav-links a { padding: 6px 13px; border-radius: 8px; font-size: 13.5px; color: var(--text2); font-weight: 500; transition: all 0.15s; }
.nav-links a:hover { color: var(--text); background: var(--bg); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 9px; }



*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }



/* ── LOGO STRIP ── */
.strip { padding: 30px 0; border-top: 1px solid var(--border); overflow: hidden; background: var(--white); }
.strip-track { display: flex; align-items: center; gap: 14px; animation: scroll-l 28s linear infinite; width: max-content; }
.strip-pill { display: flex; align-items: center; gap: 7px; padding: 7px 18px; border: 1px solid var(--border); border-radius: 999px; background: var(--white); font-size: 12.5px; font-weight: 600; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.strip-pill .d { width: 7px; height: 7px; border-radius: 50%; }
@keyframes scroll-l { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ── SECTION HEADER ── */
.sec-head { text-align: center; margin-bottom: 48px; }
.eyebrow { font-size: 11.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
.sec-head h2 { font-size: clamp(26px, 3.2vw, 40px); font-weight: 800; letter-spacing: -0.025em; color: var(--text); margin-bottom: 10px; }
.sec-head p { color: var(--muted); font-size: 15px; max-width: 420px; margin: 0 auto; }

/* ── SERVICES / PILLARS ── */
.services { padding: 88px 0; background: var(--white); }
.svc-grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; background: var(--border); gap: 1px; }
.svc-card { background: var(--white); padding: 30px 26px; transition: background 0.18s; }
.svc-card:hover { background: var(--bg); }
.svc-icon { display: none; }
.svc-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.02em; }
.svc-card p { font-size: 13px; color: var(--muted); line-height: 1.65; }
.svc-card .svc-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
.svc-card .svc-list li { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.svc-card .svc-list li::before { content: '·'; color: var(--accent); font-size: 18px; line-height: 0; }
.svc-cta { text-align: center; margin-top: 32px; }

/* ── WHY CALIBRO35 ── */
.cases { padding: 88px 0; background: var(--bg); }
.cases-rows { display: flex; flex-direction: column; gap: 20px; margin-bottom: 36px; }
.c-row {
  display: grid; grid-template-columns: 240px 1fr;
  border-radius: var(--r); overflow: hidden;
  box-shadow: var(--sh);
  transition: box-shadow 0.25s;
}
.c-row:hover { box-shadow: var(--sh-lg); }
.c-thumb { overflow: hidden; }
.c-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
.c-row:hover .c-thumb img { transform: scale(1.04); }
.c-body {
  background: #181928; padding: 32px 36px;
  display: flex; flex-direction: column; justify-content: center; gap: 12px;
}
.c-body h3 {
  font-size: 26px; font-weight: 800; color: #fff;
  line-height: 1.1; letter-spacing: -0.02em;
}
.c-body p { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; max-width: 560px; }
.cases-cta { text-align: center; }

/* ── BENTO
 ── */
.ai-action { padding: 88px 0; background: var(--white); }
.bento { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: auto; gap: 14px; }
.bc { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; overflow: hidden; transition: box-shadow 0.2s, border-color 0.2s; }
.bc:hover { box-shadow: var(--sh); border-color: var(--border2); }
.bc h3 { font-size: 13.5px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.bc p { font-size: 12px; color: var(--muted); line-height: 1.55; }
.bc.c2 { grid-column: span 2; }
.bc.c3 { grid-column: span 3; }
.bc.r2 { grid-row: span 2; }
.bc.dark { background: #171612; border-color: #171612; }
.bc.dark h3 { color: #fff; }
.bc.tinted { background: var(--bg); }
.bc.tinted2 { background: #faf9f5; }
.nn-layers { display: flex; flex-direction: column; gap: 5px; margin-top: 12px; }
.nn-layer { display: flex; align-items: center; gap: 7px; padding: 6px 9px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; font-size: 11.5px; }
.nn-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.nn-name { font-weight: 600; color: var(--text2); }
.nn-size { margin-left: auto; color: var(--muted); font-size: 11px; }
.tag-cloud { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
.tag-chip { padding: 3px 9px; border-radius: 6px; background: var(--white); border: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text2); }
.tag-chip.gold { background: var(--accent-light); border-color: #ffd4b0; color: var(--accent-h); }
.stat-items { display: flex; flex-direction: column; gap: 11px; margin-top: 13px; }
.stat-row-item {}
.stat-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.stat-num { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
.stat-lbl { font-size: 10.5px; color: rgba(255,255,255,0.4); }
.sbar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.sbar-fill { height: 100%; border-radius: 2px; }
.vis-imgs { display: flex; gap: 5px; margin-top: 11px; }
.vis-imgs img { flex: 1; height: 66px; border-radius: 8px; object-fit: cover; }
.rec-list { display: flex; flex-direction: column; gap: 5px; margin-top: 11px; }
.rec-item { display: flex; align-items: center; gap: 7px; padding: 5px 8px; background: var(--white); border: 1px solid var(--border); border-radius: 7px; }
.rec-ico { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.rec-txt { font-size: 11.5px; font-weight: 500; color: var(--text2); }
.lock-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 8px; }
.lock-circle { width: 58px; height: 58px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-light), #ffe8d0); border: 2px solid #ffd4b0; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 12px auto 0; }
.dash-img { margin-top: 11px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); }
.dash-img img { width: 100%; height: 100px; object-fit: cover; display: block; }
.bento-header-img { margin-top: 11px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); }
.bento-header-img img { width: 100%; height: 100px; object-fit: cover; display: block; }
.bento-cta { text-align: center; margin-top: 32px; }

/* ── PRICING ── */
.pricing {
  padding: 88px 0;
  background: linear-gradient(140deg, #1a1916 0%, #2e2b22 50%, #3a3520 100%);
  position: relative; overflow: hidden;
}
.pricing::after {
  content: ''; position: absolute; top: -200px; right: -200px;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,168,75,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.pricing .sec-head h2 { color: #fff; }
.pricing .eyebrow { color: var(--accent); }
.pricing .sec-head p { color: rgba(255,255,255,0.55); }
.pr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; position: relative; z-index: 1; }
.pr-card { background: #fff; border-radius: var(--r); padding: 28px 24px; position: relative; }
.pr-name { font-size: 13.5px; font-weight: 700; color: var(--text2); margin-bottom: 3px; }
.pr-desc { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
.pr-price { display: flex; align-items: baseline; gap: 1px; margin-bottom: 20px; }
.pr-cur { font-size: 17px; font-weight: 700; color: var(--text); padding-top: 6px; }
.pr-num { font-size: 46px; font-weight: 900; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
.pr-per { font-size: 14px; color: var(--muted); }
.pr-features { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
.pr-features li { display: flex; align-items: flex-start; gap: 7px; font-size: 12.5px; color: var(--text2); }
.pr-features li::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; font-size: 13px; }
.pr-btn { width: 100%; padding: 10px; border-radius: var(--r-sm); font-weight: 700; font-size: 13.5px; border: 2px solid var(--text); color: var(--text); background: transparent; cursor: pointer; transition: all 0.18s; font-family: var(--font); }
.pr-btn:hover { background: var(--text); color: #fff; }
.pr-card.feat .pr-btn { background: var(--text); color: #fff; }
.pr-badge { position: absolute; top: -1px; right: 18px; background: var(--accent); color: #fff; font-size: 10.5px; font-weight: 700; padding: 3px 11px; border-radius: 0 0 8px 8px; letter-spacing: 0.04em; }

/* ── CTA SECTION ── */
.cta-sec { padding: 88px 0; background: var(--white); }
.cta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.cta-grid h2 { font-size: clamp(26px, 3.2vw, 40px); font-weight: 800; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 16px; }
.cta-grid p { color: var(--muted); font-size: 15px; line-height: 1.7; margin-bottom: 26px; max-width: 400px; }
.cta-img-wrap img { width: 100%; max-height: 380px; object-fit: cover; border-radius: 20px; box-shadow: var(--sh-lg); }

/* ── FOOTER ── */
footer { background: #0e0d09; padding: 64px 0 26px; }
.foot-top { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr 1.6fr; gap: 36px; margin-bottom: 48px; }
.foot-logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 14px; }
.foot-logo-box { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #fff; letter-spacing: -0.03em; }
.foot-info p, .foot-info address { font-style: normal; color: rgba(255,255,255,0.38); font-size: 12.5px; line-height: 1.8; }
.foot-col h4 { font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,0.85); margin-bottom: 14px; }
.foot-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.foot-col ul li a { color: rgba(255,255,255,0.38); font-size: 12.5px; transition: color 0.18s; }
.foot-col ul li a:hover { color: rgba(255,255,255,0.75); }
.foot-sub h4 { font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,0.85); margin-bottom: 14px; }
.foot-sub-row { display: flex; }
.foot-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-right: none; border-radius: 8px 0 0 8px; padding: 9px 13px; color: #fff; font-family: var(--font); font-size: 12.5px; outline: none; }
.foot-input::placeholder { color: rgba(255,255,255,0.28); }
.foot-sub-btn { background: var(--accent); color: #fff; font-weight: 700; font-size: 12.5px; padding: 9px 15px; border-radius: 0 8px 8px 0; cursor: pointer; transition: background 0.18s; white-space: nowrap; font-family: var(--font); }
.foot-sub-btn:hover { background: var(--accent-h); }
.foot-note { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; }
.foot-bottom { border-top: 1px solid rgba(255,255,255,0.07); padding-top: 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.foot-bottom p { color: rgba(255,255,255,0.28); font-size: 12px; }
.foot-links { display: flex; gap: 18px; }
.foot-links a { color: rgba(255,255,255,0.28); font-size: 12px; transition: color 0.18s; }
.foot-links a:hover { color: rgba(255,255,255,0.65); }

/* REVEAL */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.55s ease, transform 0.55s ease; }
.reveal.in { opacity: 1; transform: none; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .bc.c2, .bc.c3 { grid-column: span 2; }
  .foot-top { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 900px) {
  .hero-scene { grid-template-columns: 1fr; }
  .hero-cards-left, .hero-cards-right { display: none; }
  .hero-main-img { grid-column: 1; max-height: 260px; }
}
@media (max-width: 720px) {
  .hero-cta { gap: 8px; padding: 0 16px; }
  .hero-cta .btn { width: 100%; justify-content: center; }
  .nav-links { display: none; }
  .hero h1 { font-size: 28px; }
  .hero-scene {
  position: relative; max-width: 860px; margin: 0 auto;
  height: 400px; display: flex; align-items: center; justify-content: center;
}
  
  .svc-grid { grid-template-columns: 1fr; }
  .c-row {
  display: grid; grid-template-columns: 220px 1fr;
  border: 1px solid var(--border); border-radius: var(--r);
  overflow: hidden; background: var(--white);
  transition: box-shadow 0.2s;
}
  
  .c-row { grid-template-columns: 1fr; }
  .c-thumb { height: 200px; }
  .c-body { padding: 24px 22px; }
  .c-body h3 { font-size: 20px; }
  .c-thumb { height: 180px; min-height: unset; }
  .c-body { padding: 22px 20px; }
  .c-thumb { overflow: hidden; min-height: 160px; }
  .pr-grid, .bento { grid-template-columns: 1fr; }
  .bc.c2, .bc.c3, .bc.r2 { grid-column: span 1; grid-row: span 1; }
  .cta-grid { grid-template-columns: 1fr; }
  .cta-img-wrap { display: none; }
  .foot-top { grid-template-columns: 1fr; }
}

@keyframes pulse-btn {
  0%,100% { box-shadow: 0 0 0 0 rgba(241,116,12,0.55); }
  50%      { box-shadow: 0 0 0 10px rgba(241,116,12,0); }
}
.btn-accent { animation: pulse-btn 2.4s ease-in-out infinite; }
.btn-accent:hover { animation: none; }

.svc-desc { font-size:13px; color:var(--muted); line-height:1.65; display:none; margin-bottom:10px; }
.svc-card.open .svc-desc { display:block; }
.svc-toggle {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11.5px; font-weight:700; color:var(--accent);
  cursor:pointer; background:none; border:none; padding:0;
  font-family:var(--font); letter-spacing:0.03em; margin-bottom:10px;
  transition:color 0.2s;
}
.svc-toggle .arr { transition:transform 0.25s; display:inline-block; }
.svc-card.open .svc-toggle .arr { transform:rotate(90deg); }

/* ── PRELOADER ── */
#preloader {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: #f1740c;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}
#preloader.hide {
  opacity: 0; visibility: hidden; pointer-events: none;
}
.pre-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(0,0,0,0.08) 0%, transparent 55%);
  pointer-events: none;
}
.pre-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 0;
  animation: pre-fadein 0.7s ease forwards;
}
@keyframes pre-fadein {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.pre-logo { margin-bottom: 18px; }
.pre-tagline {
  font-family: "Outfit", sans-serif;
  font-size: 12px; font-weight: 500; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.65);
  margin-bottom: 56px;
}
.pre-langs {
  display: flex; align-items: center; gap: 0;
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 999px; overflow: hidden;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
}
.pre-lang {
  font-family: "Outfit", sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.6);
  padding: 13px 32px; border: none; background: transparent;
  cursor: pointer; transition: all 0.2s; position: relative;
}
.pre-lang:hover { color: #fff; }
.pre-lang.active {
  background: rgba(255,255,255,0.22);
  color: #fff;
}
.pre-sep {
  width: 1px; height: 20px;
  background: rgba(255,255,255,0.25); flex-shrink: 0;
}
.pre-hint {
  font-family: "Outfit", sans-serif;
  font-size: 11px; font-weight: 400; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.35);
  margin-top: 28px;
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.35; }
  50%       { opacity: 0.8; }
}

/* ── PAGE TRANSITION ── */
#page-wrap { opacity:0; transition: opacity 0.45s ease; }
#page-wrap.visible { opacity:1; }

.products { padding: 88px 0; background: var(--white); }
.products-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 20px; margin-top: 48px;
}
.prod-card {
  border-radius: 20px; overflow: hidden;
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform 0.25s, box-shadow 0.25s;
  background: var(--white);
}
.prod-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 56px rgba(0,0,0,0.10);
}
.prod-card-visual {
  height: 160px; position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.prod-card-visual .prod-icon {
  font-size: 52px; position: relative; z-index: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
}
/* Per-card colour tints */
.prod-card.bot    .prod-card-visual { background: linear-gradient(135deg, #1e1533 0%, #3b2d6b 100%); }
.prod-card.lp     .prod-card-visual { background: linear-gradient(135deg, #7a2e00 0%, #f1740c 100%); }
.prod-card.camp   .prod-card-visual { background: linear-gradient(135deg, #0a3d2e 0%, #1a8f62 100%); }
.prod-card.gadget .prod-card-visual { background: linear-gradient(135deg, #141823 0%, #2d3a52 100%); }
/* Decorative grid lines on visual */
.prod-card-visual::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
}
/* Floating badge top-right */
.prod-badge {
  position: absolute; top: 14px; right: 14px; z-index: 2;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 999px; padding: 4px 12px;
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,0.9); letter-spacing: 0.06em;
  text-transform: uppercase;
}
.prod-card-body {
  padding: 26px 28px 28px; flex: 1;
  display: flex; flex-direction: column;
}
.prod-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 10px;
}
.prod-card.bot    .prod-tag { color: #7c5cbf; }
.prod-card.lp     .prod-tag { color: #f1740c; }
.prod-card.camp   .prod-tag { color: #1a8f62; }
.prod-card.gadget .prod-tag { color: #4a6080; }
.prod-tag::before {
  content: ''; width: 6px; height: 6px;
  border-radius: 50%; background: currentColor; flex-shrink: 0;
}
.prod-card h3 {
  font-size: 20px; font-weight: 800; color: var(--text);
  letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px;
}
.prod-value {
  font-size: 14px; color: var(--text2); font-weight: 500;
  line-height: 1.5; margin-bottom: 18px; font-style: italic;
}
.prod-benefits {
  list-style: none; display: flex; flex-direction: column;
  gap: 8px; margin-bottom: 24px; flex: 1;
}
.prod-benefits li {
  display: flex; align-items: flex-start; gap: 9px;
  font-size: 13.5px; color: var(--text2); line-height: 1.5;
}
.prod-benefits li::before {
  content: '→'; font-weight: 700; flex-shrink: 0;
  margin-top: 1px;
}
.prod-card.bot    .prod-benefits li::before { color: #7c5cbf; }
.prod-card.lp     .prod-benefits li::before { color: #f1740c; }
.prod-card.camp   .prod-benefits li::before { color: #1a8f62; }
.prod-card.gadget .prod-benefits li::before { color: #4a6080; }
.prod-cta {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 11px 22px; border-radius: 999px;
  font-family: var(--font); font-weight: 700; font-size: 13.5px;
  text-decoration: none; transition: all 0.2s; align-self: flex-start;
  border: 2px solid; cursor: pointer;
}
.prod-card.bot    .prod-cta { color: #7c5cbf; border-color: #7c5cbf; }
.prod-card.bot    .prod-cta:hover { background: #7c5cbf; color: #fff; }
.prod-card.lp     .prod-cta { color: #f1740c; border-color: #f1740c; }
.prod-card.lp     .prod-cta:hover { background: #f1740c; color: #fff; }
.prod-card.camp   .prod-cta { color: #1a8f62; border-color: #1a8f62; }
.prod-card.camp   .prod-cta:hover { background: #1a8f62; color: #fff; }
.prod-card.gadget .prod-cta { color: #2d3a52; border-color: #2d3a52; }
.prod-card.gadget .prod-cta:hover { background: #2d3a52; color: #fff; }
@media (max-width: 768px) {
  .products-grid { grid-template-columns: 1fr; gap: 16px; }
  .prod-card-visual { height: 130px; }
  .prod-icon { font-size: 40px; }
}

}

  letter-spacing: -0.025em; color: var(--text); margin-bottom: 24px;
}
.products-bottom-cta h3 em {
  font-style: normal; color: var(--text);
}

/* ── SHOWCASE ── */
.showcase {
  position: relative; width: 100%;
  height: 100vh; min-height: 560px; max-height: 900px;
  overflow: hidden; background: #0e0d09;
}
.showcase-slides {
  position: relative; width: 100%; height: 100%;
}
.showcase-slide {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.9s ease;
  background-size: cover; background-position: center;
}
.showcase-slide.active { opacity: 1; }

/* Overlay gradient — bottom text area */
.showcase-slide::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(
    to top,
    rgba(10,9,6,0.82) 0%,
    rgba(10,9,6,0.35) 40%,
    rgba(10,9,6,0.10) 100%
  );
}
/* Placeholder when no image */
.showcase-slide-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1a1916 0%, #2a2720 100%);
}
.showcase-slide-placeholder span {
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.2);
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* Bottom content bar */
.showcase-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 10; padding: 40px 48px 44px;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px;
}
.showcase-meta { display: flex; flex-direction: column; gap: 6px; }
.showcase-counter {
  font-size: 11px; font-weight: 700; color: #f1740c;
  letter-spacing: 0.15em; text-transform: uppercase;
}
.showcase-title {
  font-size: clamp(22px, 3vw, 36px); font-weight: 800;
  color: #fff; letter-spacing: -0.02em; line-height: 1.1;
}
.showcase-desc {
  font-size: 14px; color: rgba(255,255,255,0.55); margin-top: 2px;
}

/* Navigation */
.showcase-nav {
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.showcase-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
  color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.showcase-btn:hover {
  background: #f1740c; border-color: #f1740c;
}

/* Progress dots */
.showcase-dots {
  display: flex; align-items: center; gap: 6px;
}
.showcase-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.25); cursor: pointer;
  transition: all 0.3s;
}
.showcase-dot.active {
  width: 24px; border-radius: 3px;
  background: #f1740c;
}

/* Progress bar */
.showcase-progress {
  position: absolute; top: 0; left: 0; height: 3px;
  background: #f1740c; z-index: 11;
  transition: width linear;
}

/* Section label top-left */
.showcase-label {
  position: absolute; top: 32px; left: 48px; z-index: 11;
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5);
  letter-spacing: 0.14em; text-transform: uppercase;
}
.showcase-label::before {
  content: ''; width: 20px; height: 2px;
  background: #f1740c; border-radius: 2px;
}

@media (max-width: 768px) {
  .showcase { height: 75vh; min-height: 480px; }
  .showcase-content { padding: 28px 24px 32px; flex-direction: column; align-items: flex-start; gap: 20px; }

  .showcase-label { top: 20px; left: 24px; }
}

.sc-track-wrap {

  cursor: grab;
  margin-bottom: 0;
}
.sc-track-wrap:active { cursor: grabbing; }
.sc-track {
  display: flex; align-items: center;
  position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  gap: 20px; padding: 0 calc(50vw - 172px);
  will-change: transform;
  transition: transform 0.05s linear;
}

/* Card */
.sc-card {
  flex: 0 0 312px; height: 468px;
  border-radius: 16px; overflow: hidden;
  position: relative;
  background: #1a1a1a;
  transform: scale(0.82) rotateY(8deg);
  transform-origin: center center;
  transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94),
              box-shadow 0.35s ease, filter 0.35s ease;
  filter: brightness(0.65) saturate(0.7);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  will-change: transform, filter;
}
.sc-card.is-center {
  transform: scale(1.30) rotateY(0deg);
  filter: brightness(1) saturate(1.1);
  box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 2px rgba(241,116,12,0.5);
  z-index: 10;
}
.sc-card.is-near {
  transform: scale(0.92) rotateY(5deg);
  filter: brightness(0.82) saturate(0.85);
}
.sc-card.is-near.left { transform: scale(0.92) rotateY(5deg); }
.sc-card.is-near.right { transform: scale(0.92) rotateY(-5deg); }

.sc-card img {

}

.sc-placeholder span {

}

}

}

  width: 22px; border-radius: 3px; background: #f1740c;
}

function b64decode(str) {
  return decodeURIComponent(
    atob(str).split('').map(function(c){
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join('')
  );
}

  en: { lang:'en', tagline:'Strategic Creative Studio · Gibraltar',      hint:'select your language to continue'       },
  it: { lang:'it', tagline:'Studio Creativo Strategico · Gibilterra',    hint:'seleziona la tua lingua per continuare' },
  es: { lang:'es', tagline:'Estudio Creativo Estratégico · Gibraltar',   hint:'selecciona tu idioma para continuar'    }
};

// ── PARTICLES ─────────────────────────────────────────────────────────
(function(){
  var c=document.getElementById('pre-canvas'), ctx=c.getContext('2d');
  var W,H,pts=[],rafId;
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  for(var i=0;i<80;i++) pts.push({
    x:Math.random()*1920, y:Math.random()*1080,
    r:Math.random()*2.5+0.5,
    dx:(Math.random()-.5)*.6, dy:(Math.random()-.5)*.6,
    o:Math.random()*.5+.1
  });
  function draw(){
    rafId=requestAnimationFrame(draw);
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++) for(var j=i+1;j<pts.length;j++){
      var dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){ ctx.beginPath(); ctx.strokeStyle='rgba(255,255,255,'+(0.15*(1-d/120))+')';
        ctx.lineWidth=.5; ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke(); }
    }
    pts.forEach(function(p){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+p.o+')'; ctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0||p.x>W) p.dx*=-1; if(p.y<0||p.y>H) p.dy*=-1;
    });
  }
  draw();
  window._stopParticles=function(){ cancelAnimationFrame(rafId); };
})();

// ── RE-INIT PAGE SCRIPTS ──────────────────────────────────────────────
function initPage() {

// Showcase 3D card carousel — runs after any language is injected
function initShowcase() {
  var wrap  = document.getElementById('sc-wrap');
  var track = document.getElementById('sc-track');
  var dotsW = document.getElementById('sc-dots');
  if(!wrap || !track) return;

  var cards    = Array.prototype.slice.call(track.querySelectorAll('.sc-card'));
  var dots     = dotsW ? Array.prototype.slice.call(dotsW.querySelectorAll('.sc-dot')) : [];
  var total    = cards.length;
  if(!total) return;

  var GAP      = 20;
  var cardW    = cards[0].offsetWidth + GAP;
  var cur      = 0;
  var autoTimer;
  var AUTO_MS  = 2800;

  function update() {
    cards.forEach(function(c, i) {
      c.classList.remove('is-center','is-near','left','right');
      var dist = i - cur;
      if (dist === 0)       c.classList.add('is-center');
      else if (dist === -1) c.classList.add('is-near','left');
      else if (dist === 1)  c.classList.add('is-near','right');
    });
    cardW = cards[0].offsetWidth + GAP;
    track.style.transition = 'transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94)';
    track.style.transform  = 'translateY(-50%) translateX(' + (-(cur * cardW)) + 'px)';
    dots.forEach(function(d,i){ d.classList.toggle('active', i===cur); });
  }

  function goTo(n) {
    cur = (n + total) % total;
    update();
  }

  function startAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(function(){ goTo(cur + 1); }, AUTO_MS);
  }

  // Dots
  dots.forEach(function(d){
    d.addEventListener('click', function(){ goTo(parseInt(d.dataset.idx)); startAuto(); });
  });

  // Card click
  cards.forEach(function(c, i){
    c.addEventListener('click', function(){ goTo(i); startAuto(); });
  });

  // ── Touch swipe (mobile) ──────────────────────────────────────────
  var touchStartX = 0, touchStartY = 0, touchLocked = false;

  wrap.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchLocked = false;
    clearInterval(autoTimer);
  }, { passive: true });

  wrap.addEventListener('touchmove', function(e) {
    if (touchLocked) return;
    var dx = e.touches[0].clientX - touchStartX;
    var dy = e.touches[0].clientY - touchStartY;
    // If horizontal swipe dominates, prevent page scroll
    if (Math.abs(dx) > Math.abs(dy)) {
      e.preventDefault();
      touchLocked = true;
    }
  }, { passive: false });

  wrap.addEventListener('touchend', function(e) {
    var dx = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 35) {
      goTo(dx > 0 ? cur + 1 : cur - 1);
    }
    startAuto();
    touchLocked = false;
  }, { passive: true });

  // ── Mouse drag (desktop) ─────────────────────────────────────────
  var dragX = 0, isDrag = false;
  wrap.addEventListener('mousedown', function(e){ isDrag=true; dragX=e.clientX; clearInterval(autoTimer); wrap.style.cursor='grabbing'; });
  document.addEventListener('mouseup', function(e){
    if(!isDrag) return; isDrag=false; wrap.style.cursor='grab';
    var dx = dragX - e.clientX;
    if(Math.abs(dx) > 35) goTo(dx > 0 ? cur+1 : cur-1);
    startAuto();
  });

  // Pause on hover
  wrap.addEventListener('mouseenter', function(){ clearInterval(autoTimer); });
  wrap.addEventListener('mouseleave', function(){ startAuto(); });

  setTimeout(function(){ cardW = cards[0].offsetWidth + GAP; update(); startAuto(); }, 120);
}

initShowcase();

// Hero video — play twice then pause at frame 40
(function(){
  var v = document.getElementById('hero-vid');
  if(!v) return;
  var plays = 0;
  v.addEventListener('ended', function(){
    plays++;
    if(plays < 2){ v.currentTime=0; v.play(); }
    else { v.currentTime=1.33; v.pause(); }
  });
  v.play().catch(function(){});
})();





// Carousel
(function(){
  var c = document.getElementById('hero-carousel');
  if(!c) return;
  var cards = c.querySelectorAll('.hero-card');
  var dots  = document.querySelectorAll('.carousel-dot');
  var cardW = cards[0] ? cards[0].offsetWidth + 20 : 320;
  var active = 0;

  function setActive(i){
    active = Math.max(0, Math.min(i, cards.length-1));
    dots.forEach(function(d,j){ d.classList.toggle('active', j===active); });
  }
  dots.forEach(function(d){
    d.addEventListener('click', function(){
      var i = parseInt(d.dataset.idx);
      var offset = cards[i] ? cards[i].offsetLeft - c.offsetWidth/2 + cards[i].offsetWidth/2 : 0;
      c.scrollTo({left: offset, behavior:'smooth'});
      setActive(i);
    });
  });
  c.addEventListener('scroll', function(){
    var cx = c.scrollLeft + c.offsetWidth/2;
    var closest = 0, minD = Infinity;
    cards.forEach(function(card,i){
      var d = Math.abs(card.offsetLeft + card.offsetWidth/2 - cx);
      if(d < minD){ minD=d; closest=i; }
    });
    setActive(closest);
  });

  // drag-to-scroll desktop
  var drag=false, startX, scrollStart;
  c.addEventListener('mousedown',function(e){ drag=true; startX=e.pageX; scrollStart=c.scrollLeft; c.style.cursor='grabbing'; });
  document.addEventListener('mouseup',function(){ drag=false; c.style.cursor=''; });
  c.addEventListener('mousemove',function(e){ if(!drag) return; c.scrollLeft = scrollStart-(e.pageX-startX); });
})();


// Service card toggles — event delegation, works on all cards
document.addEventListener('click', function(e){
  var btn = e.target.closest('.svc-toggle');
  if(!btn) return;
  var card = btn.closest('.svc-card');
  if(!card) return;
  card.classList.toggle('open');
});
// Scroll reveal
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.reveal').forEach((el, i) => {
  el.style.transitionDelay = (i % 4) * 0.07 + 's';
  io.observe(el);
});
// Sticky nav
const nav = document.querySelector('nav');
if(nav) window.addEventListener('scroll', () => {
  nav.style.boxShadow = window.scrollY > 20 ? '0 4px 32px rgba(0,0,0,0.1)' : 'none';
});

}

// ── LANGUAGE BUTTONS ─────────────────────────────────────────────────
document.querySelectorAll('.pre-lang').forEach(function(btn){

  btn.addEventListener('mouseenter', function(){
    var l = btn.dataset.lang;
    document.getElementById('pre-tagline').textContent = _meta[l].tagline;
    document.getElementById('pre-hint').textContent    = _meta[l].hint;
  });

  btn.addEventListener('click', function(){
    document.querySelectorAll('.pre-lang').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    var lang = btn.dataset.lang;

    // Decode and inject
    var wrap = document.getElementById('page-wrap');
    wrap.innerHTML = b64decode(_pages[lang]);
    document.getElementById('html-root').lang = _meta[lang].lang;

    // Fade out preloader, show page
    setTimeout(function(){
      document.getElementById('preloader').classList.add('hide');
      document.body.style.overflow = '';
      window._stopParticles && window._stopParticles();
      setTimeout(function(){ wrap.classList.add('visible'); initPage(); }, 150);
    }, 380);
  });
});

document.body.style.overflow = 'hidden';
</script>
